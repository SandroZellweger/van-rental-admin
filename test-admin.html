<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Admin Script</title>
</head>
<body>
    <h1>Testing Admin Script</h1>
    <div id="test-output"></div>

    <script src="admin-script.js"></script>
    <script>
        try {
            console.log('AdminDashboard class:', AdminDashboard);
            const testDashboard = new AdminDashboard();
            console.log('Dashboard instance:', testDashboard);
            console.log('getVanAvailability method:', testDashboard.getVanAvailability);
            
            // Test the method
            const result = testDashboard.getVanAvailability(1, '2024-01-15');
            console.log('Test result:', result);
            
            document.getElementById('test-output').innerHTML = `
